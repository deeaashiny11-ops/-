<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>سوق الأساطير</title>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background: linear-gradient(180deg, #0d0d0d, #1a1a1a, #0d0d0d);
    color: #fff;
  }

  /* الشريط العلوي */
  header {
    background: #141414;
    padding: 20px;
    font-size: 26px;
    font-weight: bold;
    color: #f7c400;
    border-bottom: 2px solid #f7c400;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* زر تسجيل الدخول */
  .login-btn {
    background: #f7c400;
    color: #000;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 16px;
    text-decoration: none;
    font-weight: bold;
  }

  .menu {
  background: #1a1a1a;
  padding: 10px;
  box-shadow: 0 0 10px #000;
  display: flex;
  justify-content: center;
  gap: 20px;
}

  .menu a {
    color: #fff;
    margin: 10px;
    text-decoration: none;
    font-size: 18px;
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s;
  }

  .menu a:hover {
    background: #333;
  }

  /* هيرو */
  .hero {
    padding: 40px 20px;
    text-align: center;
    font-size: 28px;
    background: #000;
    border-top: 2px solid #f7c400;
    border-bottom: 2px solid #f7c400;
  }

  /* البحث */
  .search-box {
    text-align: center;
    margin: 30px;
  }

  .search-box input {
    width: 80%;
    padding: 14px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #222;
    color: #fff;
  }

  /* العناوين */
  .section-title {
    text-align: center;
    font-size: 26px;
    margin-top: 40px;
    color: #f7c400;
  }

  /* الأقسام */
  .games {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
  }

  .card {
    background: #1f1f1f;
    padding: 20px;
    width: 150px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    text-align: center;
    border: 1px solid #333;
  }

  .card:hover {
    background: #292929;
    transform: scale(1.05);
  }

  /* الحسابات المميزة */
  .featured {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px;
    flex-wrap: wrap;
  }

  .featured-card {
    background: #262626;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 0 10px #000;
    border: 1px solid #333;
  }

  /* الفوتر */
  footer {
    background: #141414;
    padding: 15px;
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
    border-top: 2px solid #f7c400;
  }
</style>
</head>

<body>

<header>
  🏆 سوق الأساطير
  <a class="login-btn" href="#">تسجيل الدخول</a>
</header>

<div class="menu">
  <a href="#">الرئيسية</a>
  <a href="clash.html">كلاش أوف كلانس</a>
  <a href="#">ببجي</a>
</div>

<div class="hero">
  أهلاً بك في سوق الأساطير 🔥  
  أفضل مكان لشراء حسابات كلاش وببجي
</div>

<div class="search-box">
  <input type="text" placeholder="🔍 ابحث عن حساب...">
</div>

<div class="section-title">🎮 الأقسام</div>

<div class="games">
  <div class="card">كلاش أوف كلانس</div>
  <div class="card">ببجي موبايل</div>
</div>

<div class="section-title">🔥 الحسابات المميزة</div>

<div class="featured">
  <div class="featured-card">
    حساب كلاش تاون هول 15  
    <br><br>⭐ مستوى عالي  
    <br>💰 25$
  </div>

  <div class="featured-card">
    حساب ببجي لفل 75  
    <br><br>🎖 سكنات نادرة  
    <br>💰 30$
  </div>
</div>

<footer>
  © 2026 سوق الأساطير – جميع الحقوق محفوظة
</footer>

</body>
</html>
<footer style="
  background:#141414;
  padding:20px;
  text-align:center;
  color:#fff;
  border-top:2px solid #f7c400;
  margin-top:40px;
">
